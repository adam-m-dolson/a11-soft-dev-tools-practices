name: Test Lowest Number Program

on:
  push:

jobs:
  run-tests:
    name: Run Lowest Number Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run test case 1 - ten numbers
        run: |
          python3 find_lowest_number.py test_data/test1_input.txt test1_output.txt
          diff -u test_data/test1_expected.txt test1_output.txt

      - name: Run test case 2 - one number
        run: |
          python3 find_lowest_number.py test_data/test2_input.txt test2_output.txt
          diff -u test_data/test2_expected.txt test2_output.txt

      - name: Run test case 3 - blank file
        run: |
          python3 find_lowest_number.py test_data/test3_input.txt test3_output.txt
          diff -u test_data/test3_expected.txt test3_output.txt